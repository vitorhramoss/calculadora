<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="main.css">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card calculadora shadow-lg p-4">

<h3 class="text-center text-white mb-4">Calculadora</h3>

<input id="resultado" type="text" class="form-control text-end mb-3 fs-3" readonly>

<div class="row g-2">

<div class="col-3">
<button class="btn btn-secondary w-100" onclick="limpar()">C</button>
</div>

<div class="col-3">
<button class="btn btn-secondary w-100" onclick="apagar()">←</button>
</div>

<div class="col-3">
<button class="btn btn-warning w-100" onclick="insert('/')">/</button>
</div>

<div class="col-3">
<button class="btn btn-warning w-100" onclick="insert('*')">*</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('7')">7</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('8')">8</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('9')">9</button>
</div>

<div class="col-3">
<button class="btn btn-warning w-100" onclick="insert('-')">-</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('4')">4</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('5')">5</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('6')">6</button>
</div>

<div class="col-3">
<button class="btn btn-warning w-100" onclick="insert('+')">+</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('1')">1</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('2')">2</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('3')">3</button>
</div>

<div class="col-3">
<button class="btn btn-success w-100" onclick="calcular()">=</button>
</div>

<div class="col-6">
<button class="btn btn-light w-100" onclick="insert('0')">0</button>
</div>

<div class="col-3">
<button class="btn btn-light w-100" onclick="insert('.')">.</button>
</div>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
